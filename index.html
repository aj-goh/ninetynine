<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ninetynine</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/cSdmW0dv/IMG-4965.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <script src="game.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <header class="container mt-3">
        <div class="d-flex justify-content-between">
            <h2 id="title">ninetynine</h2>
            <ul id="actions" class="d-flex flex-row gap-2">
                <li><button id="action-restart"><i class="h3 bi bi-arrow-clockwise"></i></button></li>
                <li><button id="action-help" data-bs-toggle="modal" data-bs-target="#helpModal"><i
                            class="h3 bi bi-question-circle"></i></button></li>
                <!-- <li><button id="action-settings"><i class="h3 bi bi-gear"></i></button></li> -->
            </ul>
        </div>
        <hr class="my-2">
    </header>
    <main>
        <div id="game" class="d-flex flex-column align-items-center mt-5">
            <h1 id="num">0</h1>
            <p id="move">Move 1</p>
            <button id="replay" hidden><i class="bi bi-arrow-clockwise me-1"></i>Play again</button>

            <div id="btns" class="container my-5 row">
                <button id="btn1" class="btn-add col-4 col-md">+</button>
                <button id="btn2" class="btn-add col-4 col-md">+</button>
                <button id="btn3" class="btn-add col-4 col-md">+</button>
                <button id="btn4" class="btn-sub col-6 col-md">-</button>
                <button id="btn5" class="btn-sub col-6 col-md">-</button>
            </div>
        </div>
    </main>
    <div class="modal fade" id="helpModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center px-3 py-5">
                <button class="btn-close position-absolute top-0 end-0 m-4" data-bs-dismiss="modal"></button>
                <h2 class="display-4 mb-4">How to Play</h2>
                <p class="mx-auto mb-2">Start from a random number</p>
                <p class="mx-auto mb-2">
                    Tap <span class="text-add fw-bold"><i class="bi bi-plus-square-fill"></i> blue</span> to add,
                    and <span class="text-sub fw-bold"><i class="bi bi-dash-square-fill"></i> pink</span> to subtract
                </p>
                <p class="mx-auto mb-2">Reach <strong>99</strong> in as few moves as possible</p>
            </div>
        </div>
    </div>
</body>

</html>
